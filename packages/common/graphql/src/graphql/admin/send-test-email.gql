mutation admin_send_test_email($host: String!, $port: Int!, $sender: String!, $username: String!, $password: String!, $ignoreTLS: Boolean!) {
  sendTestEmail(config: {
    host: $host,
    port: $port,
    sender: $sender,
    username: $username,
    password: $password,
    ignoreTLS: $ignoreTLS,
  })
}